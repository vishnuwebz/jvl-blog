{% extends 'blog/base.html' %}

{% block title %} {{ blog_title|default:"Post Detail" }} {% endblock %}

{% block content %}
    <article>
        <h2>{{ post.title }}</h2>
        <p class="post-meta">
            ID: {{ post.id }} | Title length: {{ post.title|length }} characters
        </p>
        <p>
            {{ post.excerpt }}
        </p>
        <p>
            <a href="{% url 'blog:index' %}">&laquo; Back to all posts</a>
        </p>
    </article>
{% endblock %}
